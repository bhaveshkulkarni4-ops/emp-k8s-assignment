apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-app

  template:
    metadata:
      labels:
        app: employee-app

    spec:
      containers:
      - name: employee-app

        image: employee-app:1.0

        ports:
        - containerPort: 5000